{{- if .Values.webhook.enabled }}
{{- if .Values.webhook.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-dra-driver-npu.webhookServiceAccountName" . }}
  namespace: {{ include "k8s-dra-driver-npu.namespace" . }}
  labels:
    {{- include "k8s-dra-driver-npu.labels" . | nindent 4 }}
  {{- with .Values.webhook.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
