---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-dra-driver-npu.fullname" . }}-role-binding
  namespace: {{ include "k8s-dra-driver-npu.namespace" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "k8s-dra-driver-npu.serviceAccountName" . }}
  namespace: {{ include "k8s-dra-driver-npu.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "k8s-dra-driver-npu.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
