name: Release Draft

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-amd64:
    uses: ./.github/workflows/image-build-push.yaml
    with:
      registry: docker.io
      image_repository: rebellions/k8s-dra-driver-npu
      image_tag: ${{ github.ref_name }}-amd64
      runner: ubuntu-latest
    secrets:
      registry_id: ${{ secrets.DOCKERHUB_USERNAME }}
      registry_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  build-arm64:
    uses: ./.github/workflows/image-build-push.yaml
    with:
      registry: docker.io
      image_repository: rebellions/k8s-dra-driver-npu
      image_tag: ${{ github.ref_name }}-arm64
      runner: ubuntu-22.04-rbln-arm
    secrets:
      registry_id: ${{ secrets.DOCKERHUB_USERNAME }}
      registry_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    env:
      IMAGE: docker.io/rebellions/k8s-dra-driver-npu
    steps:
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Create version and latest manifests
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ github.ref_name }}" \
            "${IMAGE}:${{ github.ref_name }}-amd64" \
            "${IMAGE}:${{ github.ref_name }}-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${{ github.ref_name }}-amd64" \
            "${IMAGE}:${{ github.ref_name }}-arm64"


  package-helm-chart:
    name: Package Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Package chart
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p dist
          helm package deployments/helm/k8s-dra-driver-npu \
            --destination dist \
            --version "$VERSION" \
            --app-version "$TAG"
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-${{ github.ref_name }}
          path: dist/*.tgz

  draft-release:
    needs: [manifest, package-helm-chart]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart-${{ github.ref_name }}
          path: dist
      - name: Generate release notes
        run: |
          set -euo pipefail
          cat <<EOF > release_notes.md
          Draft release for ${GITHUB_REF_NAME}.
          EOF
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: "RBLN DRA Driver for NPUs ${{ github.ref_name }} Release "
          body_path: release_notes.md
          files: dist/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
